<!DOCTYPE html>
<html>
  <head>
    <title>Random Picture Generator</title>
  </head>
  <body>
    <button id="picture-button">Get a random picture</button>
    <br>
    <img id="picture-display" src="images/image.png" alt="Random Picture">
    
    <script>
      let pictures = [
        "01g51tke1zr51hft6762.png",
        "image.png",
        "cutest-dog-breeds-.png",
        
      ];
      let currentIndex = 0;
      const pictureDisplay = document.getElementById('picture-display');
      
      // Show a random picture on page load
      const randomIndex = Math.floor(Math.random() * pictures.length);
      pictureDisplay.src = "images/" + pictures[randomIndex];
      currentIndex = randomIndex;
      
      // Add event listener for picture button click
      document.getElementById('picture-button').addEventListener('click', () => {
        let randomIndex = Math.floor(Math.random() * pictures.length);
        while (randomIndex === currentIndex) {
          randomIndex = Math.floor(Math.random() * pictures.length);
        }
        pictureDisplay.src = "images/" + pictures[randomIndex];
        currentIndex = randomIndex;
      });
    </script>
  </body>
</html>
