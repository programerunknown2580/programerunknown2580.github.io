<!DOCTYPE html>
<html>
  <head>
    <title>Random Dog Picture Generator</title>
  </head>
  <body>
    <button id="dog-button">Get a random dog picture</button>
    <br />
    <img id="dog-image" src="https://images.dog.ceo/breeds/spaniel-brittany/n02101388_1938.jpg" alt="Random dog picture" />
    <script>
      const dogPictures = [
        '100-cutest-dog-breeds-in-the-worlde.png'
      ];

      function getRandomDogPicture() {
        const randomNumber = Math.floor(Math.random() * dogPictures.length);
        const dogPicture = dogPictures[randomNumber];
        document.getElementById('dog-image').src = dogPicture;
      }

      document.getElementById('dog-button').addEventListener('click', getRandomDogPicture);
    </script>
  </body>
</html>
